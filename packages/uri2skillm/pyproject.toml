[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uri2skillm"
version = "0.1.0"
description = "skillm:// URI to DSL adapter"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "dsl2skillm>=0.1.0",
]

[project.scripts]
uri2skillm = "uri2skillm.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
