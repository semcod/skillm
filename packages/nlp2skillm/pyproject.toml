[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nlp2skillm"
version = "0.1.0"
description = "Natural language to skillm DSL"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "skillm>=0.1.0",
    "dsl2skillm>=0.1.0",
]

[project.scripts]
nlp2skillm = "nlp2skillm.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
