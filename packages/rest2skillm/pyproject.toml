[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rest2skillm"
version = "0.1.0"
description = "REST API for skillm control DSL"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "dsl2skillm>=0.1.0",
    "fastapi>=0.110",
    "uvicorn>=0.27",
]

[project.scripts]
rest2skillm = "rest2skillm.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
